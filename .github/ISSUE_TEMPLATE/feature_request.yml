name: Feature request
description: Suggest an improvement or the next platform milestone.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to add or change?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add examples, screenshots, or workflow notes.

