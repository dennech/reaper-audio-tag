name: tests

on:
  push:
  pull_request:

jobs:
  macos-tests:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Set up Lua and pandoc
        run: |
          brew install lua pandoc

      - name: Set up ReaPack index tooling
        run: |
          gem install reapack-index -v 1.2.6 --user-install
          echo "$(ruby -e 'require "rubygems"; print File.join(Gem.user_dir, "bin")')" >> "$GITHUB_PATH"

      - name: Validate ReaPack metadata
        run: |
          bash scripts/generate_reapack_index.sh --check

      - name: Run Python tests
        run: |
          python3 tests/scripts/run_python_tests.py --scope python

      - name: Backend self-test
        run: |
          python3 -m reaper_audio_tag_backend self-test --result-file /tmp/reaper-audio-tag-backend-self-test.json

      - name: Run integration tests
        run: |
          python3 tests/scripts/run_python_tests.py --scope integration

      - name: Run Lua tests
        run: |
          lua tests/lua/run_tests.lua
