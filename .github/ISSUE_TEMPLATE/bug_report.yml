name: Bug report
description: Report a runtime, Lua, REAPER, or installation issue.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: REAPER version, macOS version, chip, Python version, and backend.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste the runtime log path or screenshots if available.

