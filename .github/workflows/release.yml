name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "GitHub Release tag to upload assets to"
        required: true
        default: "v0.4.4"

permissions:
  contents: write

jobs:
  backend-assets:
    name: backend asset (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            asset_suffix: macos-x86_64
            executable: reaper-audio-tag-backend
          - runner: macos-latest
            asset_suffix: macos-arm64
            executable: reaper-audio-tag-backend
          - runner: windows-latest
            asset_suffix: windows-x64
            executable: reaper-audio-tag-backend.exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}
          fetch-depth: 0

      - name: Validate release checkout
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${{ github.event.inputs.tag_name || github.ref_name }}"
          if [[ "${release_tag}" != v* ]]; then
            echo "Release tag must start with v: ${release_tag}" >&2
            exit 1
          fi
          tag_sha="$(git rev-list -n 1 "${release_tag}")"
          head_sha="$(git rev-parse HEAD)"
          if [[ "${head_sha}" != "${tag_sha}" ]]; then
            echo "Checked out ${head_sha}, but ${release_tag} points to ${tag_sha}." >&2
            echo "Refusing to upload release assets built from a different commit." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build backend executable
        run: |
          pyinstaller --onefile --name reaper-audio-tag-backend --collect-all onnxruntime backend/pyinstaller_entrypoint.py

      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p release-assets
          cp "dist/${{ matrix.executable }}" "release-assets/reaper-audio-tag-backend-${{ matrix.asset_suffix }}${{ runner.os == 'Windows' && '.exe' || '' }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper-audio-tag-backend-${{ matrix.asset_suffix }}
          path: release-assets/*

      - name: Upload GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          overwrite_files: true

  model-asset-note:
    name: model asset reminder
    runs-on: ubuntu-latest
    steps:
      - name: Print model asset requirement
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
        run: |
          echo "Attach cnn14_waveform_clipwise_opset17.onnx to the ${RELEASE_TAG} GitHub Release."
          echo "Expected SHA-256: deb65c5a2d291b3ce4ebf2360af71072b789ba11a4214ef77406b89ab97333aa"
